<svg width="500" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1 -->
  <rect x="100" y="20" width="300" height="80" fill="lightblue" stroke="black" stroke-width="2"/>
  <text x="250" y="50" text-anchor="middle" font-size="16" font-weight="bold">Layer 1: Citizen Interface</text>
  <text x="250" y="70" text-anchor="middle" font-size="12">React PWA, WhatsApp/SMS (Twilio), GPS + Photo</text>

  <!-- Arrow -->
  <line x1="250" y1="100" x2="250" y2="120" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 2 -->
  <rect x="100" y="130" width="300" height="60" fill="lightgreen" stroke="black" stroke-width="2"/>
  <text x="250" y="155" text-anchor="middle" font-size="16" font-weight="bold">Layer 2: Event Streaming</text>
  <text x="250" y="170" text-anchor="middle" font-size="12">Redis Streams (raw.submissions, classified.complaints)</text>

  <!-- Arrow -->
  <line x1="250" y1="190" x2="250" y2="210" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 3 -->
  <rect x="100" y="220" width="300" height="60" fill="lightyellow" stroke="black" stroke-width="2"/>
  <text x="250" y="245" text-anchor="middle" font-size="16" font-weight="bold">Layer 3: AI Processing</text>
  <text x="250" y="260" text-anchor="middle" font-size="12">gpt-4o-mini (mock) + PostGIS + Dedup Cluster + Priority Scorer</text>

  <!-- Arrow -->
  <line x1="250" y1="280" x2="250" y2="300" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 3.5 -->
  <rect x="100" y="310" width="300" height="60" fill="lightcoral" stroke="black" stroke-width="2"/>
  <text x="250" y="335" text-anchor="middle" font-size="16" font-weight="bold">Layer 3.5: Routing</text>
  <text x="250" y="350" text-anchor="middle" font-size="12">FastAPI routing table + HMAC webhook + Celery retry</text>

  <!-- Arrow -->
  <line x1="250" y1="370" x2="250" y2="390" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 4 -->
  <rect x="100" y="400" width="300" height="60" fill="lightpink" stroke="black" stroke-width="2"/>
  <text x="250" y="425" text-anchor="middle" font-size="16" font-weight="bold">Layer 4: Privacy Vault</text>
  <text x="250" y="440" text-anchor="middle" font-size="12">HMAC-SHA256 tokenization + Gaussian DP noise (ε=2.0/0.5)</text>

  <!-- Arrow -->
  <line x1="250" y1="460" x2="250" y2="480" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 5 -->
  <rect x="100" y="490" width="300" height="60" fill="lightcyan" stroke="black" stroke-width="2"/>
  <text x="250" y="515" text-anchor="middle" font-size="16" font-weight="bold">Layer 5: Persistence</text>
  <text x="250" y="530" text-anchor="middle" font-size="12">PostgreSQL 16+PostGIS + MinIO + Redis sorted sets</text>

  <!-- Arrow -->
  <line x1="250" y1="550" x2="250" y2="570" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 5.5 -->
  <rect x="100" y="580" width="300" height="60" fill="lightgray" stroke="black" stroke-width="2"/>
  <text x="250" y="605" text-anchor="middle" font-size="16" font-weight="bold">Layer 5.5: Verification Engine</text>
  <text x="250" y="620" text-anchor="middle" font-size="12">gpt-4o vision (mock) + PG trigger enforcement</text>

  <!-- Arrow -->
  <line x1="250" y1="640" x2="250" y2="660" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 6 -->
  <rect x="100" y="670" width="300" height="60" fill="lightgoldenrodyellow" stroke="black" stroke-width="2"/>
  <text x="250" y="695" text-anchor="middle" font-size="16" font-weight="bold">Layer 6: Presentation</text>
  <text x="250" y="710" text-anchor="middle" font-size="12">React+Vite + Mapbox GL JS + Socket.io</text>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>