<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Submission -->
  <rect x="50" y="50" width="100" height="50" fill="lightblue" stroke="black" stroke-width="2" rx="10"/>
  <text x="100" y="75" text-anchor="middle" font-size="14" font-weight="bold">Submission</text>
  <text x="100" y="90" text-anchor="middle" font-size="10">Citizen submits</text>

  <!-- Arrow to Ingestion -->
  <line x1="150" y1="75" x2="200" y2="75" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Ingestion -->
  <rect x="210" y="50" width="100" height="50" fill="lightgreen" stroke="black" stroke-width="2" rx="10"/>
  <text x="260" y="75" text-anchor="middle" font-size="14" font-weight="bold">Ingestion</text>
  <text x="260" y="90" text-anchor="middle" font-size="10">Gateway API</text>

  <!-- Arrow to AI Processing -->
  <line x1="310" y1="75" x2="360" y2="75" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AI Processing -->
  <rect x="370" y="20" width="120" height="110" fill="lightyellow" stroke="black" stroke-width="2" rx="10"/>
  <text x="430" y="45" text-anchor="middle" font-size="14" font-weight="bold">AI Processing</text>
  <text x="430" y="60" text-anchor="middle" font-size="10">Classifier</text>
  <text x="430" y="75" text-anchor="middle" font-size="10">Deduplication</text>
  <text x="430" y="90" text-anchor="middle" font-size="10">Priority Scorer</text>
  <text x="430" y="105" text-anchor="middle" font-size="10">Spatial Analysis</text>

  <!-- Arrow to Routing -->
  <line x1="430" y1="130" x2="430" y2="160" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Routing -->
  <rect x="390" y="170" width="80" height="50" fill="lightcoral" stroke="black" stroke-width="2" rx="10"/>
  <text x="430" y="190" text-anchor="middle" font-size="14" font-weight="bold">Routing</text>
  <text x="430" y="205" text-anchor="middle" font-size="10">Webhook</text>

  <!-- Arrow to Assignment -->
  <line x1="430" y1="220" x2="430" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Assignment -->
  <rect x="390" y="260" width="80" height="50" fill="lightpink" stroke="black" stroke-width="2" rx="10"/>
  <text x="430" y="280" text-anchor="middle" font-size="14" font-weight="bold">Assignment</text>
  <text x="430" y="295" text-anchor="middle" font-size="10">Officers</text>

  <!-- Arrow to Resolution -->
  <line x1="430" y1="310" x2="430" y2="340" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Resolution -->
  <rect x="370" y="350" width="120" height="50" fill="lightcyan" stroke="black" stroke-width="2" rx="10"/>
  <text x="430" y="370" text-anchor="middle" font-size="14" font-weight="bold">Resolution</text>
  <text x="430" y="385" text-anchor="middle" font-size="10">Field worker + AI verify</text>

  <!-- Arrow to Closure -->
  <line x1="490" y1="375" x2="540" y2="375" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Closure -->
  <rect x="550" y="350" width="80" height="50" fill="lightgray" stroke="black" stroke-width="2" rx="10"/>
  <text x="590" y="370" text-anchor="middle" font-size="14" font-weight="bold">Closure</text>
  <text x="590" y="385" text-anchor="middle" font-size="10">Audit trail</text>

  <!-- Arrowhead -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>